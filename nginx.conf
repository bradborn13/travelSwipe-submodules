events {
    worker_connections 1024;
}
 
http {
 
    include       mime.types;
    default_type  application/octet-stream;
 
    sendfile on;
    keepalive_timeout 65;
 
    # -----------------------------
    # Upstream Services
    # -----------------------------
 
    upstream activities_service {
        least_conn;
        server activities-api:8080;
    }
 
    upstream cities_service {
        least_conn;
        server cities-api:8080;
    }
 
    upstream countries_service {
        least_conn;
        server countries-api:8080;
    }
 
    # -----------------------------
    # Main Gateway
    # -----------------------------
 
    server {
        listen 80;
 
        # Health check endpoint
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
 
        # -----------------------------
        # Activities Service
        # -----------------------------
        location /activities/ {
            proxy_pass http://activities_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
 
        # -----------------------------
        # Cities Service
        # -----------------------------
        location /cities/ {
            proxy_pass http://cities_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
 
        # -----------------------------
        # Countries Service
        # -----------------------------
        location /countries/ {
            proxy_pass http://countries_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}